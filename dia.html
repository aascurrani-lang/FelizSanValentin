<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Amor</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffeef2;
            font-family: 'Arial', sans-serif;
            color: #d63384;
            text-align: center;
        }

        /* El Árbol (Simplificado con un emoji o imagen para que te funcione rápido) */
        .tree-container {
            font-size: 100px;
            margin-bottom: 20px;
            animation: grow 2s ease-in-out;
        }

        @keyframes grow {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .typing-text {
            font-size: 24px;
            font-weight: bold;
            height: 30px;
            margin-bottom: 20px;
        }

        .counter {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 18px;
        }

        .heart {
            color: red;
            font-size: 30px;
        }
    </style>
</head>
<body>

    <div class="tree-container">🌸🌳🌸</div>

    <div class="typing-text" id="typewriter"></div>

    <div class="counter">
        <p>Nuestro tiempo que nos conocemos:</p>
        <div id="timer">Cargando tiempo...</div>
    </div>

    <script>
        // 1. Efecto de Escritura (Typewriter)
        const text = "Para mi niña bonita , con unos ojitos preciosos ¡Te amo muchoteeee!";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }

        // 2. Contador de Tiempo
        // CAMBIA ESTA FECHA por el día que se conocieron o empezaron
        const startDate = new Date("2024-12-27T00:00:00"); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById("timer").innerHTML = 
                `<b>${days}</b> días, <b>${hours}</b> horas, <b>${minutes}</b> min y <b>${seconds}</b> seg`;
        }

        // Iniciar funciones
        typeWriter();
        setInterval(updateTimer, 1000);
    </script>
    <audio id="miCancion" loop>
  <source src="imag/Tú y Yo (Original).mp3" type="audio/mpeg">
</audio>

</body>
</html>
